<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trident OS v4 · Capitán del Marketing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- App root · all renders happen here · scripts NEVER touched -->
  <div id="app-root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6B7280;font-family:system-ui,sans-serif">
      Cargando Trident OS…
    </div>
  </div>

  <!-- Config global · firebase-config.local.js carga primero (gitignored · contiene secrets reales) ·
       si no existe (404), continúa silencioso y firebase-config.js usa placeholders -->
  <script src="firebase-config.local.js?v=2" onerror="this.remove();" defer></script>
  <script src="firebase-config.js?v=2" defer></script>

  <!-- All heavy CDN libs are lazy-loaded on demand by their consumer modules ·
       see lazy-loader.js. This keeps initial page load fast (~50KB instead of ~3MB).
       Libs loaded only when needed:
       - html-docx-js (~150KB) · cuando descargas un .docx
       - easymde (~500KB) · cuando abrís el editor in-app
       - papaparse (~50KB) · cuando subís un .csv
       - mammoth (~600KB) · cuando subís un .docx
       - pdf.js (~1.5MB) · cuando subís un .pdf -->

  <!-- notify-sound · sonido + toast + title flash · liviano (~3KB) -->
  <script src="notify-sound.js"></script>

  <!-- App entrypoint (ES module) -->
  <script type="module" src="main.js"></script>
</body>
</html>
