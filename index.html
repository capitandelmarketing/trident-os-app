<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trident OS v4 · Capitán del Marketing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- App root · all renders happen here · scripts NEVER touched -->
  <div id="app-root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6B7280;font-family:system-ui,sans-serif">
      Cargando Trident OS…
    </div>
  </div>

  <!-- Config global · firebase-config.local.js carga primero (gitignored · contiene secrets reales) ·
       si no existe (404), continúa silencioso y firebase-config.js usa placeholders -->
  <script src="firebase-config.local.js?v=2" onerror="this.remove();" defer></script>
  <script src="firebase-config.js?v=2" defer></script>

  <!-- html-docx-js · DOCX from HTML (no npm) -->
  <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>

  <!-- EasyMDE · markdown editor (Turn 6c · operator edits outputs in-app) -->
  <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
  <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

  <!-- Brief importer parsers (Turn 6h.1) · CSV/DOCX/PDF support -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/mammoth@1.7.2/mammoth.browser.min.js"></script>
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
    // Configure pdf.js worker (required for pdf parsing)
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
    }
  </script>

  <!-- notify-sound · sonido + toast + title flash cuando sistema necesita Damian -->
  <script src="notify-sound.js"></script>

  <!-- App entrypoint (ES module) -->
  <script type="module" src="main.js"></script>
</body>
</html>
